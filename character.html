<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персонаж — BlazBlue: Entropy Effect</title>
    <link rel="stylesheet" href="style.css">
    <style>

    /* ══════════════════════════════════════════
       CSS-ПЕРЕМЕННЫЕ ТЕМЫ (меняются через JS)
       ══════════════════════════════════════════ */
    :root {
        --cp:     #1abc9c;   /* primary   */
        --cpd:    #083d30;   /* dark      */
        --cpg:    #76d7c4;   /* glow      */
        --cpa:    #2dd4bf;   /* accent    */
        --cpdim:  #0d5c47;   /* dim       */
    }

    html, body { scroll-behavior: smooth; }

    /* ══ ПРОГРЕСС-БАР СКРОЛЛА ══ */
    .scroll-progress {
        position: fixed;
        top: 0; left: 0;
        height: 3px;
        width: 0%;
        background: linear-gradient(90deg, var(--cpd), var(--cp), var(--cpg));
        z-index: 9999;
        box-shadow: 0 0 8px var(--cpg);
        transition: width 0.1s linear;
    }

    /* ══ CANVAS ══ */
    #charBg {
        position: fixed; inset: 0;
        z-index: 0; pointer-events: none;
    }

    /* ══ ШАПКА ══ */
    .cp-header {
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(7,11,23,0.93);
        border-bottom: 2px solid var(--cp);
        box-shadow: 0 2px 40px color-mix(in srgb, var(--cp) 30%, transparent);
        transition: border-color 0.5s, box-shadow 0.5s;
    }
    .cp-header-inner {
        max-width: 1200px; margin: 0 auto;
        padding: 0 2rem; height: 70px;
        display: flex; align-items: center;
        justify-content: space-between; gap: 1.5rem;
    }
    .cp-back {
        display: inline-flex; align-items: center;
        gap: 0.5rem; padding: 0.45rem 1.2rem;
        font-family: var(--font-display);
        font-size: 0.72rem; font-weight: 800;
        letter-spacing: 0.2em; text-transform: uppercase;
        color: var(--cpg);
        border: 1px solid color-mix(in srgb, var(--cpg) 35%, transparent);
        border-radius: var(--radius-sm);
        background: color-mix(in srgb, var(--cp) 7%, transparent);
        transition: all 0.3s ease; text-decoration: none;
    }
    .cp-back:hover {
        background: color-mix(in srgb, var(--cp) 18%, transparent);
        border-color: var(--cp); color: #fff;
        box-shadow: 0 0 16px color-mix(in srgb, var(--cp) 35%, transparent);
        transform: translateX(-3px);
    }
    .cp-header-title {
        font-family: var(--font-display);
        font-size: 1rem; font-weight: 900;
        color: var(--cpg); letter-spacing: 0.1em;
        text-transform: uppercase;
        text-shadow: 0 0 14px color-mix(in srgb, var(--cpg) 50%, transparent);
    }
    .cp-nav-chars {
        display: flex; gap: 0.5rem; align-items: center;
    }
    .cp-nav-btn {
        padding: 0.4rem 0.9rem;
        font-family: var(--font-display);
        font-size: 0.65rem; font-weight: 800;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--clr-text-dim);
        border: 1px solid var(--clr-border);
        border-radius: var(--radius-sm);
        background: rgba(255,255,255,0.03);
        transition: all 0.3s; text-decoration: none;
        display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .cp-nav-btn:hover {
        color: var(--cpg); border-color: var(--cp);
        background: color-mix(in srgb, var(--cp) 10%, transparent);
    }

    /* ══ HERO ══ */
    .cp-hero {
        position: relative; z-index: 1;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        max-width: 1200px; margin: 0 auto;
        padding: 5rem 2rem 4rem; gap: 4rem;
    }
    .cp-tag {
        display: inline-block;
        padding: 0.3rem 1rem;
        font-family: var(--font-display);
        font-size: 0.65rem; font-weight: 800;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: #fff; background: var(--cpdim);
        border: 1px solid var(--cp);
        border-radius: var(--radius-sm);
        margin-bottom: 1.2rem;
        box-shadow: 0 0 14px color-mix(in srgb, var(--cp) 35%, transparent);
    }
    .cp-hero-name {
        font-family: var(--font-display);
        font-size: clamp(3rem, 7vw, 5.5rem);
        font-weight: 900; color: #fff;
        line-height: 0.9; letter-spacing: 0.03em;
        text-transform: uppercase;
        text-shadow: 0 0 40px color-mix(in srgb, var(--cp) 50%, transparent),
                     0 4px 20px rgba(0,0,0,0.8);
        margin-bottom: 0.3rem;
    }
    .cp-hero-role {
        font-family: var(--font-logo);
        font-size: 0.72rem; letter-spacing: 0.35em;
        color: var(--cp); text-transform: uppercase;
        text-shadow: 0 0 10px color-mix(in srgb, var(--cp) 50%, transparent);
        margin-bottom: 2rem;
    }
    .cp-quick-stats {
        display: grid; grid-template-columns: repeat(3,1fr);
        gap: 0.8rem; margin-bottom: 1.8rem;
    }
    .cp-qs {
        padding: 0.85rem 0.6rem;
        background: color-mix(in srgb, var(--cp) 6%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 20%, transparent);
        border-radius: var(--radius-md);
        text-align: center; transition: all 0.3s;
    }
    .cp-qs:hover {
        background: color-mix(in srgb, var(--cp) 13%, transparent);
        border-color: var(--cp); transform: translateY(-3px);
    }
    .cp-qs-val {
        font-family: var(--font-display);
        font-size: 1.3rem; font-weight: 900;
        color: var(--cpg); line-height: 1;
        text-shadow: 0 0 10px color-mix(in srgb, var(--cpg) 40%, transparent);
    }
    .cp-qs-lbl {
        font-family: var(--font-main);
        font-size: 0.6rem; font-weight: 600;
        letter-spacing: 0.15em; color: var(--clr-text-dim);
        text-transform: uppercase; margin-top: 0.3rem;
    }
    .cp-hero-desc {
        font-family: var(--font-main);
        font-size: 0.93rem; font-weight: 500;
        color: var(--clr-text-dim); line-height: 1.8;
        border-left: 2px solid var(--cp);
        padding-left: 1.1rem; margin-bottom: 1.8rem;
    }
    .cp-hero-desc strong { color: var(--cpg); }
    .cp-tags-row {
        display: flex; gap: 0.6rem; flex-wrap: wrap;
    }
    .cp-badge {
        display: inline-block; padding: 0.28rem 0.85rem;
        font-family: var(--font-display);
        font-size: 0.63rem; font-weight: 800;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--cpg);
        border: 1px solid color-mix(in srgb, var(--cp) 30%, transparent);
        border-radius: 3px;
    }

    /* ══ VISUAL FRAME ══ */
    .cp-char-frame {
        position: relative; width: 320px; height: 400px;
        display: flex; align-items: flex-end;
        justify-content: center; margin: 0 auto;
    }
    .cp-char-frame::before {
        content: '';
        position: absolute; inset: 0;
        background: radial-gradient(ellipse 80% 90% at 50% 60%,
            color-mix(in srgb, var(--cp) 18%, transparent) 0%, transparent 70%);
        border-radius: 50%;
        animation: cpGlowPulse 3s ease-in-out infinite;
    }
    @keyframes cpGlowPulse {
        0%,100%{opacity:.6;transform:scale(1)}
        50%{opacity:1;transform:scale(1.08)}
    }
    .cp-char-img {
        position: relative; z-index: 2;
        width: 100%; height: 100%;
        object-fit: contain; object-position: top center;
        filter: drop-shadow(0 0 30px color-mix(in srgb, var(--cp) 60%, transparent))
                drop-shadow(0 0 70px color-mix(in srgb, var(--cp) 25%, transparent));
        animation: cpFloat 4s ease-in-out infinite;
        transition: filter 0.5s;
    }
    @keyframes cpFloat {
        0%,100%{transform:translateY(0)}
        50%{transform:translateY(-14px)}
    }
    .cp-char-platform {
        position: absolute; bottom: -8px; left: 50%;
        transform: translateX(-50%);
        width: 150px; height: 6px;
        background: linear-gradient(90deg, transparent, var(--cp), transparent);
        border-radius: 50%; filter: blur(4px); opacity: 0.6;
        animation: cpGlowPulse 3s ease-in-out infinite; z-index: 1;
    }

    /* ══ ДЕКОРАТИВНЫЕ ЭЛЕМЕНТЫ (зависят от типа) ══ */
    .cp-deco-el {
        position: absolute;
        width: 20px; height: 20px;
        opacity: 0;
        animation: cpDecoAppear 3s ease-in-out infinite;
        pointer-events: none;
    }
    @keyframes cpDecoAppear {
        0%,100%{opacity:0;transform:scale(.5)rotate(0deg)}
        30%,70%{opacity:.6;transform:scale(1)rotate(45deg)}
    }
    .cp-deco-el:nth-child(1){top:10%;left:5%;animation-delay:0s}
    .cp-deco-el:nth-child(2){top:25%;right:5%;animation-delay:.7s;animation-duration:2.8s}
    .cp-deco-el:nth-child(3){top:55%;left:7%;animation-delay:1.4s;animation-duration:3.5s}
    .cp-deco-el:nth-child(4){top:70%;right:7%;animation-delay:.3s;animation-duration:2.6s}

    /* ══ СЕКЦИИ ══ */
    .cp-section {
        position: relative; z-index: 1;
        padding: 5rem 2rem;
        opacity: 0; transform: translateY(30px);
        transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .cp-section.visible {
        opacity: 1; transform: translateY(0);
    }
    .cp-section:nth-child(even) {
        background: color-mix(in srgb, var(--cpd) 12%, transparent);
        border-top: 1px solid color-mix(in srgb, var(--cp) 12%, transparent);
        border-bottom: 1px solid color-mix(in srgb, var(--cp) 12%, transparent);
    }
    .cp-section-inner {
        max-width: 1100px; margin: 0 auto;
    }
    .cp-section-head {
        display: flex; align-items: center;
        gap: 1.2rem; margin-bottom: 3rem;
    }
    .cp-section-line {
        flex: 1; height: 1px;
        background: linear-gradient(90deg, var(--cp), transparent);
    }
    .cp-section-line.rev {
        background: linear-gradient(90deg, transparent, var(--cp));
    }
    .cp-section-title {
        font-family: var(--font-display);
        font-size: 1.45rem; font-weight: 900;
        letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--cpg);
        text-shadow: 0 0 18px color-mix(in srgb, var(--cp) 40%, transparent);
        white-space: nowrap;
    }
    .cp-section-num {
        font-family: var(--font-logo);
        font-size: 0.65rem;
        color: color-mix(in srgb, var(--cp) 40%, transparent);
        letter-spacing: 0.1em; white-space: nowrap;
    }

    /* ══ ДОСЬЕ ══ */
    .cp-dossier {
        display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
    }
    .cp-dossier-table {
        background: color-mix(in srgb, var(--cpd) 20%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 18%, transparent);
        border-radius: var(--radius-lg); overflow: hidden;
    }
    .cp-dossier-row {
        display: grid; grid-template-columns: 130px 1fr;
        border-bottom: 1px solid color-mix(in srgb, var(--cp) 8%, transparent);
        transition: background 0.2s;
    }
    .cp-dossier-row:last-child{border-bottom:none}
    .cp-dossier-row:hover{background:color-mix(in srgb,var(--cp) 5%,transparent)}
    .cp-dossier-key {
        padding: 0.8rem 1rem;
        font-family: var(--font-display);
        font-size: 0.63rem; font-weight: 800;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--cp);
        border-right: 1px solid color-mix(in srgb, var(--cp) 12%, transparent);
        display: flex; align-items: center;
    }
    .cp-dossier-val {
        padding: 0.8rem 1rem;
        font-family: var(--font-main);
        font-size: 0.86rem; font-weight: 500;
        color: var(--clr-text); display: flex;
        align-items: center; line-height: 1.5;
    }

    /* ══ СТАТЫ ══ */
    .cp-stats-block {
        background: color-mix(in srgb, var(--cpd) 20%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 18%, transparent);
        border-radius: var(--radius-lg);
        padding: 1.8rem; display: flex;
        flex-direction: column; gap: 0.9rem;
    }
    .cp-stat-row {
        display: flex; align-items: center; gap: 1rem;
    }
    .cp-stat-label {
        font-family: var(--font-display); font-size: 0.66rem;
        font-weight: 800; color: var(--clr-text-dim);
        width: 40px; text-align: right; letter-spacing: 0.08em;
    }
    .cp-stat-bar {
        flex: 1; height: 7px;
        background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden;
    }
    .cp-stat-fill {
        height: 100%; border-radius: 4px;
        background: linear-gradient(90deg, var(--cpd), var(--cp));
        box-shadow: 0 0 8px color-mix(in srgb, var(--cp) 50%, transparent);
        width: 0%; transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .cp-stat-val {
        font-family: var(--font-logo); font-size: 0.72rem;
        color: var(--cpg); width: 30px;
    }
    .cp-diff-block {
        margin-top: 1rem; padding-top: 1rem;
        border-top: 1px solid color-mix(in srgb, var(--cp) 10%, transparent);
    }
    .cp-diff-label {
        font-family: var(--font-display); font-size: 0.62rem;
        font-weight: 800; letter-spacing: 0.15em;
        text-transform: uppercase; color: var(--clr-text-dim);
        margin-bottom: 0.6rem;
    }
    .cp-diff-stars {
        display: flex; gap: 0.3rem; align-items: center;
    }
    .cp-diff-stars span {
        font-size: 1.3rem; color: var(--cp);
    }
    .cp-diff-text {
        font-family: var(--font-main); font-size: 0.76rem;
        color: var(--clr-text-dim); margin-left: 0.5rem;
    }

    /* ══ ИСТОРИЯ ══ */
    .cp-story-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem;
    }
    .cp-story-card {
        background: color-mix(in srgb, var(--cpd) 15%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 15%, transparent);
        border-radius: var(--radius-lg); padding: 1.6rem;
        transition: all 0.3s;
    }
    .cp-story-card:hover {
        background: color-mix(in srgb, var(--cp) 8%, transparent);
        border-color: color-mix(in srgb, var(--cp) 35%, transparent);
        transform: translateY(-4px);
        box-shadow: 0 12px 35px rgba(0,0,0,0.35);
    }
    .cp-story-num {
        font-family: var(--font-logo); font-size: 1.9rem;
        font-weight: 900;
        color: color-mix(in srgb, var(--cp) 15%, transparent);
        line-height: 1; margin-bottom: 0.4rem;
    }
    .cp-story-title {
        font-family: var(--font-display); font-size: 0.93rem;
        font-weight: 800; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--cpg);
        margin-bottom: 0.7rem;
    }
    .cp-story-text {
        font-family: var(--font-main); font-size: 0.86rem;
        font-weight: 500; color: var(--clr-text-dim); line-height: 1.8;
    }
    .cp-story-text strong{color:var(--cpg)}
    .cp-story-text em{color:var(--clr-text);font-style:italic}
    .cp-story-full {
        margin-top: 2rem; padding: 2rem;
        background: color-mix(in srgb, var(--cpd) 15%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 15%, transparent);
        border-left: 3px solid var(--cp);
        border-radius: var(--radius-md);
    }
    .cp-story-full p {
        font-family: var(--font-main); font-size: 0.92rem;
        font-weight: 500; color: var(--clr-text-dim);
        line-height: 1.9; margin-bottom: 1.1rem;
    }
    .cp-story-full p:last-child{margin-bottom:0}
    .cp-story-full strong{color:var(--cpg)}
    .cp-story-full em{color:var(--clr-text)}
    .cp-quote {
        margin: 2.5rem 0; padding: 1.4rem 2rem;
        background: color-mix(in srgb, var(--cp) 4%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 15%, transparent);
        border-radius: var(--radius-md); text-align: center;
    }
    .cp-quote-text {
        font-family: 'Georgia', serif; font-size: 1.03rem;
        font-style: italic; color: var(--clr-text);
        line-height: 1.7; margin-bottom: 0.55rem;
    }
    .cp-quote-attr {
        font-family: var(--font-main); font-size: 0.68rem;
        letter-spacing: 0.2em; color: var(--cp); text-transform: uppercase;
    }

    /* ══ НАВЫКИ ══ */
    .cp-skills-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(290px,1fr));
        gap: 1.1rem;
    }
    .cp-skill-card {
        background: color-mix(in srgb, var(--cpd) 18%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 15%, transparent);
        border-radius: var(--radius-lg); padding: 1.4rem;
        display: flex; gap: 1rem; align-items: flex-start;
        transition: all 0.3s; position: relative; overflow: hidden;
    }
    .cp-skill-card::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg, color-mix(in srgb, var(--cp) 8%, transparent) 0%, transparent 60%);
        opacity: 0; transition: opacity 0.3s;
    }
    .cp-skill-card:hover::before{opacity:1}
    .cp-skill-card:hover {
        border-color: color-mix(in srgb, var(--cp) 40%, transparent);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4),
                    0 0 20px color-mix(in srgb, var(--cp) 10%, transparent);
    }
    .cp-skill-icon {
        width: 46px; height: 46px;
        border-radius: var(--radius-md);
        background: color-mix(in srgb, var(--cp) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 30%, transparent);
        display: flex; align-items: center;
        justify-content: center; font-size: 1.35rem;
        flex-shrink: 0;
        box-shadow: 0 0 12px color-mix(in srgb, var(--cp) 20%, transparent);
    }
    .cp-skill-info{flex:1}
    .cp-skill-name {
        font-family: var(--font-display); font-size: 0.86rem;
        font-weight: 800; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--cpg);
        margin-bottom: 0.35rem; position: relative; z-index: 1;
    }
    .cp-skill-type {
        display: inline-block; font-family: var(--font-display);
        font-size: 0.57rem; font-weight: 800;
        letter-spacing: 0.14em; text-transform: uppercase;
        color: #fff; background: var(--cpdim);
        border-radius: 3px; padding: 0.12rem 0.45rem;
        margin-bottom: 0.5rem;
    }
    .cp-skill-desc {
        font-family: var(--font-main); font-size: 0.82rem;
        font-weight: 500; color: var(--clr-text-dim);
        line-height: 1.7; position: relative; z-index: 1;
    }
    .cp-skill-desc strong{color:var(--cp)}

    /* ══ МЕХАНИКИ ══ */
    .cp-mechanic-hero {
        background: color-mix(in srgb, var(--cpd) 20%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 25%, transparent);
        border-radius: var(--radius-lg); padding: 2.4rem;
        margin-bottom: 1.8rem; position: relative; overflow: hidden;
    }
    .cp-mechanic-hero-title {
        font-family: var(--font-display); font-size: 1.25rem;
        font-weight: 900; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--cpg);
        margin-bottom: 0.9rem;
        text-shadow: 0 0 15px color-mix(in srgb, var(--cp) 40%, transparent);
    }
    .cp-mechanic-hero-sub {
        font-family: var(--font-logo); font-size: 0.63rem;
        letter-spacing: 0.25em; color: var(--cp);
        text-transform: uppercase; margin-bottom: 1rem;
    }
    .cp-mechanic-hero-desc {
        font-family: var(--font-main); font-size: 0.92rem;
        font-weight: 500; color: var(--clr-text-dim); line-height: 1.85;
    }
    .cp-mechanic-hero-desc strong{color:var(--cpg)}
    .cp-mechanic-hero-desc code {
        font-family: 'Courier New', monospace; font-size: 0.82em;
        color: var(--cpa);
        background: color-mix(in srgb, var(--cp) 8%, transparent);
        padding: 0.1em 0.4em; border-radius: 3px;
    }
    .cp-mech-steps {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
        gap: 0.9rem; margin-top: 1.6rem;
    }
    .cp-mstep {
        background: color-mix(in srgb, var(--cp) 6%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 18%, transparent);
        border-radius: var(--radius-md); padding: 1.1rem; text-align: center;
    }
    .cp-mstep-num {
        font-family: var(--font-logo); font-size: 1.7rem;
        font-weight: 900;
        color: color-mix(in srgb, var(--cp) 30%, transparent);
        line-height: 1; margin-bottom: 0.4rem;
    }
    .cp-mstep-title {
        font-family: var(--font-display); font-size: 0.76rem;
        font-weight: 800; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--cpg); margin-bottom: 0.35rem;
    }
    .cp-mstep-desc {
        font-family: var(--font-main); font-size: 0.79rem;
        color: var(--clr-text-dim); line-height: 1.6;
    }
    .cp-mechs-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem;
    }
    .cp-mech-card {
        background: color-mix(in srgb, var(--cpd) 15%, transparent);
        border: 1px solid color-mix(in srgb, var(--cp) 15%, transparent);
        border-radius: var(--radius-lg); padding: 1.4rem;
        transition: all 0.3s;
    }

/* ═══════════════════════════════════════════════════════════
   АНИМАЦИЯ ПОЯВЛЕНИЯ СЕКЦИЙ (Intersection Observer)
   ═══════════════════════════════════════════════════════════ */
(function() {
    const sections = document.querySelectorAll('.cp-section');
    // Hero-секция сразу видима
    const heroSection = document.querySelector('section[style*="radial-gradient"]');
    if (heroSection) heroSection.classList.add('visible');

    const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add('visible');
                io.unobserve(e.target);
            }
        });
    }, { threshold: 0.1 });

    sections.forEach(s => io.observe(s));
})();

/* ═══════════════════════════════════════════════════════════
   АНИМАЦИЯ ПОЛОС СТАТОВ
   ═══════════════════════════════════════════════════════════ */
(function() {
    let animated = false;
    const statsBlock = document.querySelector('.cp-stats-block');
    if (!statsBlock) return;

    const io = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !animated) {
            animated = true;
            document.querySelectorAll('.cp-stat-fill').forEach((fill, i) => {
                const w = fill.getAttribute('data-width');
                setTimeout(() => { fill.style.width = w + '%'; }, 150 + i * 100);
            });
            io.disconnect();
        }
    }, { threshold: 0.3 });
    io.observe(statsBlock);
})();

    const N = 65, LINK = 145;
    let t = 0;

    const nodes = Array.from({length: N}, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random()-0.5)*0.4,
        vy: (Math.random()-0.5)*0.4,
        r:  1.5 + Math.random()*2,
        phase: Math.random()*Math.PI*2
    }));

    function animate() {
        const W = cv.width, H = cv.height;
        ctx.clearRect(0,0,W,H);

        // Фон с тёмным оттенком персонажа
        ctx.fillStyle = `rgb(${darkRgb[0]*0.4|0},${darkRgb[1]*0.4|0},${darkRgb[2]*0.4|0})`;
        ctx.fillRect(0,0,W,H);

        // Радиальный глоу
        const grd = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*0.6);
        grd.addColorStop(0, `rgba(${darkRgb},0.25)`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

        // Движение узлов
        nodes.forEach(n => {
            n.x+=n.vx; n.y+=n.vy;
            if(n.x<0||n.x>W) n.vx*=-1;
            if(n.y<0||n.y>H) n.vy*=-1;
        });

        // Связи
        for(let i=0;i<nodes.length;i++) {
            for(let j=i+1;j<nodes.length;j++) {
                const a=nodes[i],b=nodes[j];
                const d=Math.hypot(a.x-b.x,a.y-b.y);
                if(d<LINK) {
                    const alpha=(1-d/LINK)*0.2;
                    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
                    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
                    ctx.lineWidth=(1-d/LINK)*1.1; ctx.stroke();
                }
            }
        }

        // Узлы
        nodes.forEach(nd => {
            const pulse=(Math.sin(t*0.03+nd.phase)+1)/2;
            const r=nd.r+pulse*1.5;
            const g=ctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,r*3.5);
            g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${0.35+pulse*0.3})`);
            g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
            ctx.fillStyle=g;
            ctx.beginPath();ctx.arc(nd.x,nd.y,r*3.5,0,Math.PI*2);ctx.fill();
            ctx.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${0.6+pulse*0.4})`;
            ctx.beginPath();ctx.arc(nd.x,nd.y,r,0,Math.PI*2);ctx.fill();
        });

        t++;
        requestAnimationFrame(animate);
    }
    animate();
})();
</script>
</body>
</html>
